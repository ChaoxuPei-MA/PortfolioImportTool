# Import config for Importer.exe (run from the tool folder):
#   dist\Importer.exe configs\import_config.yaml
# REQUIRES a Moody's SG installation + a valid licence.
# The sections below are filled with EXAMPLE values — edit them for your data
# (set a section to {} or [] to skip it).

paths:
  # EDIT: your Moody's SG install folder. The runtime config, assembly, model,
  # and data paths are derived from this automatically.
  sg_path:       "C:/Program Files/Moody's/SG/10.5.0"
  licence_path:  "C:/path/to/your/Moodys_Licence.licx"    # EDIT: your .licx
  rics_path:     "RICSFormatData"                 # the Convert output to import
  output_path:   "RICSFormatData/Portfolio_Import.bhs"    # simulation to write
  load_sim_path: ""                               # only used if settings.load_sim: true

# Merge sub-folders into a base GC type before import. EXAMPLE: merge GCP_CLO into GC.
multiple_gcp_types:
  GC:
    - GCP_CLO

# Structured portfolios: [enabled, currency, weight]. EXAMPLE enables structured_clo.
structured_portfolios_parameters:
  agency_cmbs:                  [false, 'USD', 'MarketValue']
  structured_clo:               [true,  'USD', 'MarketValue']
  structured_cre:               [false, 'USD', 'MarketValue']
  structured_retail:            [false, 'USD', 'MarketValue']
  all_structured_selected:      [false, 'USD', 'MarketValue']
  all_structured:               [false, 'USD', 'MarketValue']
  all_structured_nonstructured: [false, 'USD', 'MarketValue']

# Combined portfolios: name: [[portfolios to merge], currency, weight]. EXAMPLE:
userDefined_combined_structured_nonstructured_portfolios:
  Combined_Corp: [["GC", "GC_CLO"], 'USD', 'MarketValue']

settings:
  load_sim: false
  keep_existing_portfolios: false
  import_economies: true
  import_transition_matrices: true
  import_mpr_models: true
  import_zscore_models: true
  base_date: "2025-06-30"        # EDIT: simulation base date
  base_economy: "USD"            # EDIT: base economy

# Issuer/bond outputs. EXAMPLE: CreditClass for all types, TotalValue for GC + GCCRE.
# outputs[i] pairs with selection[i]. Use [] / [] to add no outputs.
Issuer_Bond_Output:
  outputs:   ["CreditClass", "TotalValue"]
  selection: [["All"], ["GC", "GCCRE"]]
