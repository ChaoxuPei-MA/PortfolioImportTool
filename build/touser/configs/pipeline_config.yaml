# Combined config for Pipeline.exe (run convert THEN import in one command):
#   dist\Pipeline.exe configs\pipeline_config.yaml
# The convert output folder is fed to import automatically, and the date is
# shared, so DO NOT set import rics_path or import base_date here.
# The import stage REQUIRES a Moody's SG install + licence (edit below).

convert:
  start_date: "20250630"
  RICS_version: "10.5"
  GCorr_Corporate_version: "2019"
  converter_paths:
    data_path: "UserData"
    output_path: "RICSFormatData"    # -> becomes the import rics_path automatically
  converter_data_types:
    granular: ["GC", "GCCRE", "AgencyMBS"]
    portfolio: ["portfolio"]
  parameters_default_values:
    ImpliedCreditClass_default_value: true
    CreditClass_default_value: "CS15"
    interpolate_lgd_lgdk_for_amortising: false
    Using_GCorr_Corp_RSQ: false
    Using_GCorr_Corp_country: true
    Using_GCorr_Corp_industry: false
    corp_rsq_fill_default_value: true
    corp_rsq_default_value: 0.159719318
    corp_factors_fill_value_groupby: true
    corp_private_groupby_columnName: "securityType"
  file_types:
    granular: ["issuers", "factors", "pds", "instruments", "lgd", "cashflows", "couponPayments", "laggard"]
    portfolio: ["Portfolios", "Holdings"]
  moodys_internal_data: "MoodysInternalData"   # bundled in the exe; fallback only
  GCorr_Corporate: "GCorr{version}"
  GCorr_files:
    file_name: "GCorr {version} Corp R-Squared Factors"
    factors: "GCorrCorpFactors{version}"
    rsqs: "RatingRSQGCorr{version}"
  Mapping_File: "GCorr_MappingTables.xlsx"
  Mapping_Tables:
    country: "CountryNameMapping"
    countryRegion: "GCorrFactosMappping"
  model_assumptions:
    RSQ:
      GC: 0.159719318
      GCCRE: 0.2077
  floating_reference_yield_curves:
    "USD 0-EDF SPOT": "NominalYieldCurve"

import:
  # rics_path and settings.base_date are set automatically from the convert stage.
  paths:
    # EDIT: your Moody's SG install; runtime/assembly/model/data derived from it.
    sg_path:       "C:/Program Files/Moody's/SG/10.5.0"
    licence_path:  "C:/path/to/your/Moodys_Licence.licx"        # EDIT
    output_path:   "RICSFormatData/Portfolio_Import.bhs"
    load_sim_path: ""
  # EXAMPLE: merge GCP_CLO into GC (edit or set to {} to skip).
  multiple_gcp_types:
    GC:
      - GCP_CLO
  # EXAMPLE enables structured_clo.
  structured_portfolios_parameters:
    agency_cmbs:                  [false, 'USD', 'MarketValue']
    structured_clo:               [true,  'USD', 'MarketValue']
    structured_cre:               [false, 'USD', 'MarketValue']
    structured_retail:            [false, 'USD', 'MarketValue']
    all_structured_selected:      [false, 'USD', 'MarketValue']
    all_structured:               [false, 'USD', 'MarketValue']
    all_structured_nonstructured: [false, 'USD', 'MarketValue']
  # EXAMPLE combined portfolio (edit or set to {} to skip).
  userDefined_combined_structured_nonstructured_portfolios:
    Combined_Corp: [["GC", "GC_CLO"], 'USD', 'MarketValue']
  settings:
    load_sim: false
    keep_existing_portfolios: false
    import_economies: true
    import_transition_matrices: true
    import_mpr_models: true
    import_zscore_models: true
    base_economy: "USD"           # EDIT
  # EXAMPLE outputs (use [] / [] to add none).
  Issuer_Bond_Output:
    outputs:   ["CreditClass", "TotalValue"]
    selection: [["All"], ["GC", "GCCRE"]]
